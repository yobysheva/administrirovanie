<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Регистрация</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page center-box">
    <section class="card auth-card">
      <h1 class="auth-heading">Регистрация</h1>

      <form class="form" action="#" method="post">
        <div class="field">
          <label class="label" for="reg-login">Логин</label>
          <input class="input" type="text" id="reg-login" name="login" placeholder="Введите логин" />
        </div>

        <div class="field">
          <label class="label" for="email">Почта</label>
          <input class="input" type="email" id="email" name="email" placeholder="Введите почту" />
        </div>

        <div class="field">
          <label class="label" for="reg-password">Пароль</label>
          <input class="input" type="password" id="reg-password" name="password" placeholder="Введите пароль" />
        </div>

        <button class="btn" type="submit">Зарегистрироваться</button>
      </form>
    </section>
  </main>
</body>
</html>
