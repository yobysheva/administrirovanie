<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html/lamp_webapp

    <Directory /var/www/html/lamp_webapp>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/lamp_webapp_error.log
    CustomLog ${APACHE_LOG_DIR}/lamp_webapp_access.log combined
</VirtualHost>
